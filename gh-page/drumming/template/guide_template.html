<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{PAGE_TITLE}}</title>
<style>
  :root {
    --accent: #8B0000;
    --accent-light: #fbe8e8;
    --ink: #1a1a1a;
    --gray: #6b6b6b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #f4f4f4;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }

  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.22;
    color: var(--ink);
  }

  .page {
    max-width: 8in;
    margin: 0.3in auto;
    background: #fff;
    padding: 0.4in 0.5in;
    box-shadow: 0 0 12px rgba(0,0,0,0.15);
  }

  header {
    padding-bottom: 6px;
    border-bottom: 3px solid var(--accent);
    margin-bottom: 8px;
  }

  header h1 {
    margin: 0;
    font-size: 20pt;
    letter-spacing: 0.3px;
    color: var(--ink);
  }

  header .subtitle {
    margin: 2px 0 0 0;
    font-size: 11.5pt;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  section {
    margin-bottom: 6px;
    page-break-inside: avoid;
    break-inside: avoid;
  }

  h2 {
    font-size: 11.5pt;
    color: var(--accent);
    margin: 0 0 3px 0;
    border-bottom: 1px solid #ddd;
    padding-bottom: 2px;
  }

  h3 {
    font-size: 10pt;
    margin: 0 0 6px 0;
    color: var(--ink);
  }

  table.ref {
    width: 100%;
    border-collapse: collapse;
  }

  table.ref td {
    border: none;
    padding: 1.5px 8px 1.5px 0;
    vertical-align: top;
  }

  table.ref td.ctrl {
    width: 30%;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
  }

  table.ref td.desc {
    width: 70%;
    color: #222;
  }

  .tip {
    margin-top: 2px;
    font-style: italic;
    color: var(--gray);
    font-size: 9pt;
  }

  .diagram-wrap {
    width: 100%;
    margin: 2px 0 4px 0;
    text-align: center;
  }

  .diagram-wrap svg {
    width: 100%;
    height: auto;
    max-width: 560px;
  }

  .diagram-wrap.pad-diagram svg {
    max-width: 400px;
  }

  .intro {
    margin: 0 0 3px 0;
    color: #333;
  }

  .routine-box {
    background: var(--accent-light);
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    padding: 6px 16px;
  }

  .routine-box ol {
    margin: 0;
    padding-left: 20px;
  }

  .routine-box li {
    margin-bottom: 2px;
  }

  .routine-box li b {
    color: var(--accent);
  }

  footer {
    margin-top: 6px;
    padding-top: 4px;
    border-top: 1px solid #ccc;
    font-size: 8pt;
    color: #999;
    text-align: center;
  }

  @media print {
    body { background: #fff; }
    .page {
      margin: 0;
      padding: 0;
      box-shadow: none;
      max-width: none;
    }
  }

  @page {
    size: letter;
    margin: 0.6in 0.7in;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </header>

{{SECTIONS}}
  <footer>{{FOOTER}}</footer>

</div>
</body>
</html>
